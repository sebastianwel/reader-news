name: Daily Pala News Update

on:
  schedule:
    # 03:00 UTC ist 05:00 Uhr deutsche Sommerzeit (perfekt für 06:00 Uhr Pala-Update)
    - cron: '0 3 * * *'
  workflow_dispatch: # Ermöglicht den manuellen Start über den "Actions" Tab

# Erlaubt der Action, Dateien in dein Repository zu schreiben
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Nutzt den Standard-Token mit den oben gesetzten Schreibrechten
          token: ${{ secrets.GITHUB_TOKEN }}
          # Wichtig für den Rebase: Den kompletten Verlauf laden
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run News Scraper
        # Stelle sicher, dass "dein_skriptname.py" exakt so heißt wie deine Datei im Repo!
        run: python dein_skriptname.py 

      - name: Commit and Push
        run: |
          # Git Identität setzen
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Sicherstellen, dass wir auf dem main-Branch sind
          git checkout main
          
          # Alle generierten Textdateien hinzufügen
          # Wir nutzen -f (force) oder prüfen auf Existenz, damit es nicht crasht
          git add *_Briefing.txt *_Wetter.txt latest_briefing.txt latest_wetter.txt || echo "Einige Dateien wurden nicht gefunden"
          
          # Commit nur ausführen, wenn Änderungen vorhanden sind
          if git diff --cached --quiet; then
            echo "Keine Änderungen zum Committen vorhanden."
          else
            git commit -m "Update Daily Briefing & Wetter: $(date +'%d.%m.%Y')"
            
            # Rebase zieht Änderungen vom Server (z.B. manuelle Code-Edits) 
            # und setzt den neuen News-Commit oben drauf.
            git pull --rebase origin main
            
            # Finaler Push
            git push origin main
          fi
