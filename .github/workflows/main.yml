name: Daily Pala News Update

on:
  schedule:
    # 03:00 UTC ist 05:00 Uhr deutsche Sommerzeit
    - cron: '0 3 * * *'
  workflow_dispatch: # Erlaubt es dir, den Download jederzeit manuell bei GitHub zu starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Notwendig, damit die Action Schreibrechte hat
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run News Scraper
        run: python dein_skriptname.py  # <-- HIER deinen Dateinamen anpassen!

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Alle neuen/geänderten Dateien hinzufügen
          git add *_Briefing.txt *_Wetter.txt latest_briefing.txt latest_wetter.txt
          
          # Nur commiten, wenn es auch Änderungen gibt
          git commit -m "Update Briefing und Wetter: $(date +'%d.%m.%Y')" || exit 0
          
          # Pull mit Rebase, um "rejected" Fehler zu vermeiden
          git pull --rebase origin main
          git push origin main
