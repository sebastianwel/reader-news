name: Daily Pala News Update

on:
  schedule:
    # 03:00 UTC ist 05:00 Uhr deutsche Sommerzeit
    - cron: '0 3 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run News Scraper
        # Hier habe ich den Namen aus deinem Screenshot eingesetzt:
        run: python generate_briefing.py 

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git fetch origin main
          git checkout main
          
          # Wir fügen alle txt-Dateien hinzu, damit sowohl 'latest' als auch die Datums-Files landen
          git add *.txt
          
          if git diff --quiet --cached; then
            echo "Keine Änderungen zum Committen."
          else
            git commit -m "Update Daily Briefing & Wetter: $(date +'%d.%m.%Y')"
            git pull --rebase origin main
            git push origin main
          fi
