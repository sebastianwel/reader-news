name: Daily Pala News Update

on:
  schedule:
    # 03:00 UTC ist 05:00 Uhr deutsche Sommerzeit
    - cron: '0 3 * * *'
  workflow_dispatch: # Ermöglicht den manuellen Start über den "Actions" Tab

# WICHTIG: Hier setzen wir die Schreibrechte explizit!
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 lädt die gesamte Historie, wichtig für sauberen Rebase
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run News Scraper
        # ERSETZE 'dein_skriptname.py' durch den echten Namen deiner Python-Datei!
        run: python dein_skriptname.py 

      - name: Commit and Push
        run: |
          # 1. Git Identität setzen
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 2. Den aktuellsten Stand vom Server holen (fetch + checkout)
          git fetch origin main
          git checkout main
          
          # 3. Die neuen Dateien zur Staging Area hinzufügen
          git add *_Briefing.txt *_Wetter.txt latest_briefing.txt latest_wetter.txt || echo "Einige Dateien fehlen"
          
          # 4. Prüfen, ob es Änderungen gibt
          if git diff --quiet --cached; then
            echo "Keine Änderungen zum Committen."
          else
            git commit -m "Update Daily Briefing & Wetter: $(date +'%d.%m.%Y')"
            
            # 5. Erneuter Pull mit Rebase direkt vor dem Push (Löst den Rejected-Fehler)
            git pull --rebase origin main
            
            # 6. Finaler Push
            git push origin main
          fi
